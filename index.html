<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
text-align:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;
overflow-x:hidden;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* HERO SECTION */

.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:48px;
margin:10px;
}

.subtitle{
font-size:20px;
margin-bottom:20px;
}

.button{
background:white;
color:#ff4d6d;
padding:12px 25px;
border-radius:30px;
font-weight:600;
cursor:pointer;
border:none;
transition:0.3s;
}

.button:hover{
transform:scale(1.1);
}

/* TEAM SECTION */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:40px 20px;
}

/* 3D CARDS */

.card{
background:white;
color:#444;
border-radius:20px;
padding:20px;
margin:15px;
width:150px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:transform 0.6s;
transform-style:preserve-3d;
text-decoration:none;
}

.card:hover{
transform:rotateY(15deg) rotateX(10deg) scale(1.1);
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:10px;
}

.name{
font-weight:600;
font-size:18px;
}

footer{
margin-top:40px;
padding:20px;
font-size:14px;
opacity:0.9;
}

/* FLOATING HEARTS */

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:floatUp 6s linear infinite;
pointer-events:none;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

/* FLOWER PETALS */

.petal{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}
}

/* SPARKLE EFFECT */

.sparkle{
position:fixed;
font-size:18px;
pointer-events:none;
animation:spark 1s forwards;
}

@keyframes spark{
0%{
transform:scale(1);
opacity:1;
}
100%{
transform:scale(2) translateY(-20px);
opacity:0;
}
}

</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

window.onload=function(){
confetti({particleCount:150,spread:100,origin:{y:0.6}});
}

/* FLOATING HEARTS */

function createHearts(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},6000);
}

setInterval(createHearts,500);

/* FLOWER PETALS */

function createPetal(){
const petal=document.createElement("div");
petal.classList.add("petal");

const flowers=["🌸","🌺","🌼","💮"];
petal.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(petal);

setTimeout(()=>{petal.remove()},9000);
}

setInterval(createPetal,700);

/* SMOOTH SCROLL */

function scrollToTeam(){
document.getElementById("team").scrollIntoView({
behavior:"smooth"
});
}

/* SPARKLE CLICK EFFECT */

document.addEventListener("click",function(e){

for(let i=0;i<8;i++){

const sparkle=document.createElement("div");
sparkle.classList.add("sparkle");
sparkle.innerHTML="✨";

sparkle.style.left=e.clientX+(Math.random()*40-20)+"px";
sparkle.style.top=e.clientY+(Math.random()*40-20)+"px";

document.body.appendChild(sparkle);

setTimeout(()=>{sparkle.remove()},1000);

}

});

</script>

</head>

<body>

<div class="hero">

<h1>🎬🏆 Bollywood Swag, Corporate Power 👑</h1>
<p class="subtitle">Celebrating the Superwomen of Our Team 💖</p>

<button class="button" onclick="scrollToTeam()">Meet Our Team</button>

</div>

<div id="team" class="container">

<a class="card" href="puja.html">
<img class="avatar" src="images/puja.jpeg">
<div class="name">Puja</div>
</a>

<a class="card" href="simran.html">
<img class="avatar" src="images/simran.jpeg">
<div class="name">Simran</div>
</a>

<a class="card" href="sneha.html">
<img class="avatar" src="images/sneha.jpeg">
<div class="name">Sneha</div>
</a>

<a class="card" href="preeti.html">
<img class="avatar" src="images/preeti.jpeg">
<div class="name">Preeti</div>
</a>

<a class="card" href="roshni.html">
<img class="avatar" src="images/roshni.jpeg">
<div class="name">Roshni</div>
</a>

<a class="card" href="kirti.html">
<img class="avatar" src="images/kirti.jpeg">
<div class="name">Kirti</div>
</a>

<a class="card" href="shraddha.html">
<img class="avatar" src="images/shraddha.png">
<div class="name">Shraddha</div>
</a>

<a class="card" href="rani.html">
<img class="avatar" src="images/rani.png">
<div class="name">Rani</div>
</a>

</div>

<footer>Made with 💖 for our incredible team</footer>

</body>
</html>
