
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{
font-family:'Poppins',sans-serif;
margin:0;
text-align:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;
overflow-x:hidden;
}
h1{margin-top:40px;font-size:40px;}
.subtitle{font-size:18px;margin-bottom:30px;}
.container{display:flex;flex-wrap:wrap;justify-content:center;padding:20px;}
.card{
background:white;color:#444;border-radius:20px;padding:20px;margin:15px;width:140px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);transition:0.3s;text-decoration:none;
}
.card:hover{transform:scale(1.1);}
.avatar{width:80px;height:80px;border-radius:50%;margin-bottom:10px;}
.name{font-weight:600;font-size:18px;}
footer{margin-top:40px;padding:20px;font-size:14px;opacity:0.9;}
.heart{position:fixed;bottom:-10px;font-size:20px;animation:floatUp 6s linear infinite;}
@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
window.onload=function(){
confetti({particleCount:150,spread:100,origin:{y:0.6}});
}
function createHearts(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHearts,500);
</script>
</head>
<body>

<h1>🌸 Happy Women's Day 🌸</h1>
<p class="subtitle">Celebrating the amazing women of our team 💖</p>

<div class="container">
<a class="card" href="puja.html"><img class="avatar" src="images/puja.png"><div class="name">Puja</div></a>
<a class="card" href="simran.html"><img class="avatar" src="images/simran.png"><div class="name">Simran</div></a>
<a class="card" href="sneha.html"><img class="avatar" src="images/sneha.png"><div class="name">Sneha</div></a>
<a class="card" href="preeti.html"><img class="avatar" src="images/preeti.png"><div class="name">Preeti</div></a>
<a class="card" href="roshni.html"><img class="avatar" src="images/roshni.png"><div class="name">Roshni</div></a>
<a class="card" href="kirti.html"><img class="avatar" src="images/kirti.png"><div class="name">Kirti</div></a>
<a class="card" href="shraddha.html"><img class="avatar" src="images/shraddha.png"><div class="name">Shraddha</div></a>
<a class="card" href="rani.html"><img class="avatar" src="images/rani.png"><div class="name">Rani</div></a>
</div>

<footer>Made with 💖 for our incredible team</footer>

</body>
</html>
